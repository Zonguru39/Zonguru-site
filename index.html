<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concentrix | Optimization Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --brand: #005a7d; --accent: #14b8a6; --lucky: #fbbf24; }
        body { background-color: var(--brand); color: white; font-family: sans-serif; margin: 0; }
        .page { display: none; min-height: 100vh; padding-bottom: 80px; }
        .page.active { display: block; }
        .card { background: white; color: #333; border-radius: 15px; padding: 20px; margin: 15px; }
        .lucky-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 25px; border-radius: 20px; z-index: 100; width: 85%; text-align: center; border: 4px solid var(--lucky); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 90; }
        .btn-main { width: 100%; background: var(--accent); padding: 15px; border-radius: 10px; color: white; font-weight: bold; margin-top: 10px; }
        .negative { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay"></div>
    <div id="lucky-popup" class="lucky-popup">
        <div class="text-3xl mb-2">🎉</div>
        <h2 class="text-xl font-black text-amber-500 uppercase">Lucky Order!</h2>
        <p class="text-sm text-gray-500 my-3">This is a high-value promotional task with 7x commission.</p>
        <div class="bg-gray-100 p-4 rounded-xl mb-4">
            <p class="text-xs text-gray-400">Order Amount</p>
            <p id="lucky-amt" class="text-xl font-bold text-red-500"></p>
        </div>
        <button onclick="processLucky()" class="btn-main bg-amber-500">Submit Lucky Order</button>
    </div>

    <div id="optimize-page" class="page active">
        <div class="p-5 flex justify-between items-center border-b border-white/10">
            <h1 class="text-xl font-bold italic">concentrix</h1>
            <div class="text-right">
                <p class="text-[10px] text-gray-300">Total Balance</p>
                <p id="balance-display" class="text-lg font-bold text-teal-400">$ 200.00</p>
            </div>
        </div>

        <div class="p-4 grid grid-cols-2 gap-3">
            <div class="bg-white/10 p-3 rounded-xl border border-white/10">
                <p class="text-[10px] text-gray-400 uppercase">Today's Profit</p>
                <p id="profit-display" class="text-xl font-bold text-teal-400">$ 0.00</p>
            </div>
            <div class="bg-white/10 p-3 rounded-xl border border-white/10 text-right">
                <p class="text-[10px] text-gray-400 uppercase">Freeze Amount</p>
                <p id="freeze-display" class="text-xl font-bold">$ 0.00</p>
            </div>
        </div>

        <div class="p-4">
            <div class="bg-white rounded-2xl p-6 text-center shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs font-bold text-gray-400">PROGRESS</span>
                    <span id="task-count" class="text-lg font-black text-teal-600">0 / 40</span>
                </div>
                <div class="w-full bg-gray-200 h-2 rounded-full mb-6">
                    <div id="progress-bar" class="bg-teal-500 h-full transition-all" style="width: 0%"></div>
                </div>
                <button id="start-btn" onclick="startOptimizing()" class="w-full bg-teal-500 py-4 rounded-xl font-bold text-white shadow-lg text-lg uppercase tracking-widest">Start Optimization</button>
            </div>
        </div>

        <div class="px-4">
            <p class="text-xs text-gray-400 mb-2">Real-time Statistics</p>
            <div class="bg-white/5 rounded-xl p-4 border border-white/10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-teal-500 rounded-full flex items-center justify-center font-bold">V1</div>
                    <div class="text-sm">
                        <p class="font-bold">VIP-1 Member</p>
                        <p class="text-xs text-gray-400">0.50 Profits per task</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let balance = 200.00;
        let profit = 0.00;
        let freeze = 0.00;
        let count = 0;
        const totalTasks = 40;
        const baseCommission = 0.50;

        // Lucky Order Settings
        const luckyTrigger = 12; // Trigger on 12th task (Can be set by Admin)
        const luckyAmount = 1500.00; // Amount higher than balance

        function startOptimizing() {
            if (count >= totalTasks) return alert("All tasks completed!");
            
            // Check for Lucky Order Trigger
            if (count + 1 === luckyTrigger) {
                showLucky();
            } else {
                processNormal();
            }
        }

        function showLucky() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('lucky-popup').style.display = 'block';
            document.getElementById('lucky-amt').innerText = `$ ${luckyAmount.toFixed(2)}`;
        }

        function processLucky() {
            // Deduct Lucky Amount from Balance (Will go negative if balance is low)
            balance -= luckyAmount;
            
            // 7x Commission Calculation
            let luckyCommission = baseCommission * 7;
            profit += luckyCommission;
            freeze += (luckyAmount + luckyCommission);
            
            count++;
            updateUI();
            
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('lucky-popup').style.display = 'none';
            
            checkNegative();
        }

        function processNormal() {
            profit += baseCommission;
            count++;
            updateUI();
        }

        function updateUI() {
            const balanceEl = document.getElementById('balance-display');
            balanceEl.innerText = `$ ${balance.toFixed(2)}`;
            
            document.getElementById('profit-display').innerText = `$ ${profit.toFixed(2)}`;
            document.getElementById('freeze-display').innerText = `$ ${freeze.toFixed(2)}`;
            document.getElementById('task-count').innerText = `${count} / ${totalTasks}`;
            document.getElementById('progress-bar').style.width = `${(count/totalTasks)*100}%`;
            
            checkNegative();
        }

        function checkNegative() {
            const balanceEl = document.getElementById('balance-display');
            if (balance < 0) {
                balanceEl.classList.add('negative');
                document.getElementById('start-btn').disabled = true;
                document.getElementById('start-btn').innerText = "Insufficient Balance";
                document.getElementById('start-btn').classList.replace('bg-teal-500', 'bg-red-500');
            }
        }
    </script>
</body>
</html>
